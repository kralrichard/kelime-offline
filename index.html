<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Kelime — İngilizce kelime pratiği</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="description" content="Çevrimdışı çalışan İngilizce kelime pratiği: okunuş, Türkçe anlam, örnek cümle ve hızlı sorular.">
<meta name="theme-color" content="#12172a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
  :root {
    --ground: #12172a;
    --ground-2: #1b2340;
    --card: rgba(255, 255, 255, .06);
    --line: rgba(255, 255, 255, .16);
    --ink: #F2EEE6;
    --ink-dim: #A6AEC6;
    --accent: #FFC978;
    --good: #4FB477;
    --bad: #D9594C;
    --r: 16px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--ground);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* Sahne: kart değiştikçe zemin tonu kayar, ilerleme hissi verir. */
  #scene {
    position: fixed;
    inset: 0;
    background: radial-gradient(120% 80% at 50% 0%, var(--ground-2) 0%, var(--ground) 70%);
    transition: filter .5s ease;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 620px;
    margin: 0 auto;
  }

  /* ---------- üst bar ---------- */
  header {
    flex: none;
    padding: 12px 18px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .statrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-variant-numeric: tabular-nums;
  }

  .badge {
    font-size: 12px;
    font-weight: 800;
    background: var(--accent);
    color: #1a1408;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: .02em;
  }

  .bar {
    flex: 1;
    height: 6px;
    background: rgba(255, 255, 255, .14);
    border-radius: 999px;
    overflow: hidden;
  }

  .bar > i {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width .4s ease;
  }

  .stat {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-dim);
    white-space: nowrap;
  }

  .levels {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .levels::-webkit-scrollbar { display: none; }

  .chip {
    flex: none;
    padding: 5px 13px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, .05);
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: #16182a;
    border-color: var(--ink);
  }

  /* ---------- kart ---------- */
  main {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 6px 18px 12px;
    display: flex;
    flex-direction: column;
  }

  /* Kısa kartları dikeyde ortalar; içerik taşarsa otomatik marjlar çöker ve
     normal şekilde yukarıdan kaydırılır. */
  .inner { margin: auto 0; width: 100%; }

  .count {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }

  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(34px, 11vw, 46px);
    font-weight: 700;
    line-height: 1.05;
    margin: 0;
    overflow-wrap: anywhere;
    text-wrap: balance;
  }

  .speak {
    flex: none;
    width: 46px;
    height: 46px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #1a1408;
    font-size: 19px;
    cursor: pointer;
  }
  .speak:active { transform: scale(.94); }

  .ipa {
    margin: 8px 0 0;
    font-size: 15px;
    color: var(--ink-dim);
  }

  .slow {
    margin-left: 10px;
    border: none;
    background: none;
    color: var(--accent);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
  }

  .meaning {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 23px;
    font-weight: 600;
    color: var(--accent);
    margin: 16px 0 0;
    line-height: 1.35;
  }

  .example {
    margin-top: 22px;
    background: rgba(0, 0, 0, .3);
    border-left: 3px solid var(--accent);
    border-radius: var(--r);
    padding: 16px 18px;
  }

  .example .en {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .example .en p {
    margin: 0;
    flex: 1;
    font-size: 17.5px;
    font-weight: 600;
    line-height: 1.45;
  }

  .example .tr {
    margin: 9px 0 0;
    font-size: 14.5px;
    color: var(--ink-dim);
    line-height: 1.5;
  }

  .mini {
    flex: none;
    border: none;
    background: none;
    color: var(--accent);
    font-size: 17px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  .hint {
    margin-top: 18px;
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-dim);
    opacity: .8;
  }

  /* Kelimeyi gerçek insanlardan dinlemek için dış kaynaklar. */
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 18px;
  }

  .links a {
    flex: 1 1 auto;
    text-align: center;
    padding: 11px 12px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: rgba(0, 0, 0, .25);
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .links a:active { transform: scale(.98); }

  .type {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 8px;
    vertical-align: middle;
  }

  .loading {
    text-align: center;
    color: var(--ink-dim);
    font-size: 14px;
    padding: 40px 0;
  }

  /* ---------- alt eylemler ---------- */
  footer {
    flex: none;
    padding: 10px 18px calc(18px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    min-width: 0;
    padding: 14px 6px;
    border-radius: var(--r);
    border: 1.5px solid var(--line);
    background: rgba(255, 255, 255, .07);
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    cursor: pointer;
  }
  .btn:active { transform: scale(.98); }
  .btn.primary { background: var(--accent); color: #1a1408; border-color: var(--accent); }
  .btn.on { background: var(--good); border-color: var(--good); color: #fff; }

  /* ---------- quiz ---------- */
  #quiz { display: none; padding: 0 18px; }
  #quiz.show { display: block; }

  .qlabel {
    text-align: center;
    font-size: 12.5px;
    font-weight: 800;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 8px;
  }

  #quiz h2 {
    font-family: Georgia, serif;
    font-size: clamp(30px, 9vw, 40px);
    text-align: center;
    margin: 8px 0 2px;
    overflow-wrap: anywhere;
  }

  #quiz .sub { text-align: center; color: var(--ink-dim); font-size: 14px; margin: 0; }

  .opts { display: grid; gap: 10px; margin-top: 22px; }

  .opt {
    padding: 14px 16px;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: rgba(255, 255, 255, .07);
    color: var(--ink);
    font: inherit;
    font-size: 15.5px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
  }
  .opt.right { background: var(--good); border-color: var(--good); color: #fff; }
  .opt.wrong { background: var(--bad); border-color: var(--bad); color: #fff; }

  /* ---------- bildirim ---------- */
  #toast {
    position: fixed;
    top: 16%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    background: var(--accent);
    color: #1a1408;
    font-weight: 800;
    font-size: 15.5px;
    padding: 9px 18px;
    border-radius: 999px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
  }
  #toast.show { animation: pop 1.3s ease forwards; }

  @keyframes pop {
    0%   { opacity: 0; transform: translateX(-50%) scale(.8); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1.04); }
    80%  { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
  }

  .anim-up   { animation: up .22s ease-out; }
  .anim-down { animation: down .22s ease-out; }
  @keyframes up   { from { opacity: 0; transform: translateY(34px); } }
  @keyframes down { from { opacity: 0; transform: translateY(-34px); } }

  @media (prefers-reduced-motion: reduce) {
    .anim-up, .anim-down, #toast.show { animation: none; }
    #toast.show { opacity: 1; }
  }
</style>
</head>
<body>
<div id="scene"></div>

<div id="app">
  <header>
    <div class="statrow">
      <span class="badge" id="lvl">Sv 1</span>
      <span class="bar"><i id="xpbar" style="width:0%"></i></span>
      <span class="stat" id="xp">0 XP</span>
      <span class="stat" id="streak">🔥 0</span>
    </div>
    <div class="levels" id="levels" role="group" aria-label="Seviye seçimi"></div>
  </header>

  <main id="card" aria-live="polite"></main>

  <div id="quiz"></div>

  <footer id="actions"></footer>
</div>

<div id="toast" role="status"></div>

<!-- Sürüm etiketi: dosyaları güncelledikten sonra bu sayıyı artır, yoksa
     tarayıcılar eski sürümü önbellekten çalıştırmaya devam eder. -->
<script src="data.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
